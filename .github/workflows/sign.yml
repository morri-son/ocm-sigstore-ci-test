name: Sign component version with Sigstore (CI)

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCM CLI from open-component-model/open-component-model
        run: |
          set -e
          # The new OCM CLI lives in open-component-model/open-component-model.
          # The legacy installer at https://ocm.software/install.sh installs the
          # old CLI from open-component-model/ocm — which has no Sigstore support.
          OCM_VERSION="${OCM_VERSION:-cli/v0.6.0}"
          curl -fL -o /usr/local/bin/ocm \
            "https://github.com/open-component-model/open-component-model/releases/download/${OCM_VERSION}/ocm-linux-amd64"
          sudo chmod +x /usr/local/bin/ocm
          ocm --version

      - name: Build CTF archive
        run: |
          ocm add component-version \
            --repository ctf::./ctf \
            --constructor ./component-constructor.yaml

      - name: Generate .ocmconfig with ghcr.io credentials
        run: |
          cat > .ocmconfig <<EOF
          type: generic.config.ocm.software/v1
          configurations:
          - type: credentials.config.ocm.software
            consumers:
            - identities:
                - type: OCIRegistry
                  hostname: ghcr.io
              credentials:
              - type: Credentials/v1
                properties:
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - identity:
                type: SigstoreSigner/v1alpha1
                signature: default
              credentials:
              - type: OIDCIdentityTokenProvider/v1alpha1
          EOF

      - name: Transfer to ghcr.io
        run: |
          ocm transfer cv \
            --config ./.ocmconfig \
            ctf::./ctf//github.com/morri-son/ocm-sigstore-ci-test/helloworld:1.0.0 \
            ghcr.io/morri-son/ocm-sigstore-ci-test

      - name: Sign component version
        run: |
          ocm sign cv \
            --config ./.ocmconfig \
            --signer-spec ./sigstore-sign.yaml \
            ghcr.io/morri-son/ocm-sigstore-ci-test//github.com/morri-son/ocm-sigstore-ci-test/helloworld:1.0.0

      - name: Show signed component
        run: |
          ocm get cv -o yaml --config ./.ocmconfig \
            ghcr.io/morri-son/ocm-sigstore-ci-test//github.com/morri-son/ocm-sigstore-ci-test/helloworld:1.0.0
