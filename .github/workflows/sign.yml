name: Sign component version with Sigstore (CI)

on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build OCM CLI from main (Sigstore is not yet in any release)
        run: |
          set -e
          # Sigstore signing was wired into the CLI in commit 2cd584261
          # (feat(cli): integrate cosign signing handler [2/2]) and is not
          # in any tagged release yet. Build from main to test the feature.
          mkdir -p /tmp/ocm-build
          cd /tmp/ocm-build
          git clone --depth 1 https://github.com/open-component-model/open-component-model.git
          cd open-component-model/cli
          go build -o /usr/local/bin/ocm ./main.go
          sudo chmod +x /usr/local/bin/ocm
          ocm version

      - name: Build CTF archive
        run: |
          ocm add component-version \
            --repository ctf::./ctf \
            --constructor ./component-constructor.yaml

      - name: Generate ocmconfig.yaml with ghcr.io credentials
        run: |
          # Use a non-default filename so the OCM CLI doesn't auto-discover
          # this file via $PWD/.ocmconfig — we want explicit --config.
          cat > ocmconfig.yaml <<EOF
          type: generic.config.ocm.software/v1
          configurations:
          - type: credentials.config.ocm.software
            consumers:
            - identities:
                - type: OCIRegistry
                  hostname: ghcr.io
              credentials:
              - type: Credentials/v1
                properties:
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
          EOF

      - name: Transfer to ghcr.io
        run: |
          ocm transfer cv \
            --config ./ocmconfig.yaml \
            ctf::./ctf//github.com/morri-son/ocm-sigstore-ci-test/helloworld:1.0.0 \
            ghcr.io/morri-son/ocm-sigstore-ci-test

      - name: Sign component version
        run: |
          ocm sign cv \
            --config ./ocmconfig.yaml \
            --signer-spec ./sigstore-sign.yaml \
            ghcr.io/morri-son/ocm-sigstore-ci-test//github.com/morri-son/ocm-sigstore-ci-test/helloworld:1.0.0

      - name: Show signed component
        run: |
          ocm get cv -o yaml --config ./ocmconfig.yaml \
            ghcr.io/morri-son/ocm-sigstore-ci-test//github.com/morri-son/ocm-sigstore-ci-test/helloworld:1.0.0
